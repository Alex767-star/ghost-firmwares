[env:t-embed]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
lib_deps =
    bodmer/TFT_eSPI@^2.5.0
    lorol/LittleFS_esp32@^1.0.6
build_flags =
    -DGHOST_TMBED
    -DUSER_SETUP_LOADED=1
    -DILI9341_DRIVER=1
    -DTFT_WIDTH=320
    -DTFT_HEIGHT=170
    -std=c++17
board_build.partitions = default_8MB.csv
board_build.flash_mode = qio
